spring:
  security:
    oauth2:
      client:
        provider:
          neutron:
            issuer-uri: "http://127.0.0.1:9000/neutron"
        registration:
          neutron:
            client-id: "neutron"
            client-secret: "neutron"
            client-name: "Neutron"
            client-authentication-method: "client_secret_basic"
            authorization-grant-type: "authorization_code"
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - "openid"
              - "profile"
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth
              uri: lb://neutron-auth
              predicates:
                - Path=/auth/**
              filters:
                - StripPrefix=1
                - TokenRelay=