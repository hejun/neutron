name: neutron

services:
  mysql:
    container_name: mysql
    image: mysql:8
    restart: always
    ports:
      - "3306:3306"
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: Hj1234
    volumes:
      - ./mysql:/docker-entrypoint-initdb.d
      - mysql:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time_zone=+8:00
      - --lower_case_table_names=1
      - --group_concat_max_len=102400
      - --innodb_buffer_pool_size=1G
      - --innodb_flush_method=O_DIRECT
    deploy:
      resources:
        limits:
          memory: 2G
    hostname: mysql
    networks:
      - net
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
  redis:
    container_name: redis
    image: redis:8-alpine
    restart: always
    ports:
      - "6379:6379"
    environment:
      TZ: Asia/Shanghai
    volumes:
      - redis:/data
    command:
      - --requirepass Hj1234
      - --appendonly yes
      - --maxmemory 700mb
      - --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 1G
    hostname: redis
    networks:
      - net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
  nacos:
    container_name: nacos
    image: nacos/nacos-server:v3.1.2-slim
    restart: always
    ports:
      - "8848:8848"
      - "9848:9848"
      - "18080:8080"
    environment:
      TZ: Asia/Shanghai
      JVM_XMS: 256m
      JVM_XMX: 256m
      JVM_XMN: 128m
      PREFER_HOST_MODE: hostname
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_DB_NAME: nacos
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: Hj1234
      MYSQL_SERVICE_DB_PARAM: useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&allowMultiQueries=true
      NACOS_AUTH_ENABLE: true
      NACOS_AUTH_IDENTITY_KEY: root
      NACOS_AUTH_IDENTITY_VALUE: Hj1234
      NACOS_AUTH_TOKEN: VGhpcyBpcyBjdXN0b20gbmFjb3Mgc2VjcmV0IGtleSE=
    deploy:
      resources:
        limits:
          memory: 512m
    hostname: nacos
    networks:
      - net
    healthcheck:
      test: [ "CMD-SHELL", "curl -f -H \"$$NACOS_AUTH_IDENTITY_KEY:$$NACOS_AUTH_IDENTITY_VALUE\" http://nacos:8848/nacos/v3/admin/core/cluster/node/self || exit 1" ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    depends_on:
      mysql:
        condition: service_healthy
  otlp-collector:
    container_name: otlp_collector
    image: otel/opentelemetry-collector-contrib:0.152.0
    restart: always
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./otlp-collector/config.yaml:/etc/otelcol-contrib/config.yaml
    deploy:
      resources:
        limits:
          memory: 256m
    hostname: otlp_collector
    networks:
      - net
  otlp-collector-healthcheck:
    container_name: otlp_collector_healthcheck
    image: busybox:1.37
    restart: on-failure
    command: [ "sleep", "infinity" ]
    network_mode: "service:otlp-collector"
    depends_on:
      - otlp-collector
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://otlp_collector:13133/ || exit 1" ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  mysql:
  redis:

networks:
  net:
    driver: bridge