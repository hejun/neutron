databaseChangeLog:
  - changeSet:
      id: 0.0.1-SNAPSHOT
      author: hejun.dev@qq.com
      changes:
        - insert:
            tableName: t_tenant
            columns:
              - column:
                  name: id
                  valueNumeric: "${init-tenant-id}"
              - column:
                  name: name
                  value: "${init-tenant-name}"
              - column:
                  name: issuer
                  value: "${init-tenant-issuer}"
              - column:
                  name: public_key
                  value: "${init-tenant-public_key}"
              - column:
                  name: private_key
                  value: "${init-tenant-private_key}"
              - column:
                  name: enabled
                  valueBoolean: "true"
        - insert:
            tableName: t_user
            columns:
              - column:
                  name: id
                  valueNumeric: "${init-user-id}"
              - column:
                  name: username
                  value: "${init-user-username}"
              - column:
                  name: password
                  value: "${init-user-password}"
              - column:
                  name: nickname
                  value: "${init-user-nickname}"
              - column:
                  name: enabled
                  valueBoolean: "true"
              - column:
                  name: tenant_id
                  valueNumeric: "${init-tenant-id}"
        - insert:
            tableName: t_client
            columns:
              - column:
                  name: id
                  valueNumeric: "${init-client-id}"
              - column:
                  name: client_id
                  value: "${init-client-client_id}"
              - column:
                  name: client_secret
                  value: "${init-client-client_secret}"
              - column:
                  name: client_name
                  value: "${init-client-client_name}"
              - column:
                  name: client_authentication_methods
                  value: "${init-client-client_authentication_methods}"
              - column:
                  name: authorization_grant_types
                  value: "${init-client-authorization_grant_types}"
              - column:
                  name: redirect_uris
                  value: "${init-client-redirect_uris}"
              - column:
                  name: post_logout_redirect_uris
                  value: "${init-client-post_logout_redirect_uris}"
              - column:
                  name: scopes
                  value: "${init-client-scopes}"
              - column:
                  name: require_proof_key
                  valueBoolean: "${init-client-require_proof_key}"
              - column:
                  name: require_authorization_consent
                  valueBoolean: "${init-client-require_authorization_consent}"
              - column:
                  name: enabled
                  valueBoolean: "true"
              - column:
                  name: tenant_id
                  valueNumeric: "${init-tenant-id}"