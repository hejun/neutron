databaseChangeLog:
  - changeSet:
      id: 0.0.1-SNAPSHOT
      author: hejun.dev@qq.com
      changes:
        - createTable:
            tableName: t_tenant
            remarks: "租户"
            columns:
              - column:
                  name: id
                  type: bigint
                  remarks: "ID"
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(100)
                  remarks: "租户名"
                  constraints:
                    nullable: false
              - column:
                  name: issuer
                  type: varchar(100)
                  remarks: "发行域名"
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_tenant_issuer
              - column:
                  name: public_key
                  type: varchar(1000)
                  remarks: "公钥"
                  constraints:
                    nullable: false
              - column:
                  name: private_key
                  type: varchar(2000)
                  remarks: "私钥"
                  constraints:
                    nullable: false
              - column:
                  name: enabled
                  type: bit(1)
                  remarks: "是否启用, 0: 否, 1: 是. 默认: 1"
                  constraints:
                    nullable: false
                  defaultValueBoolean: true
              - column:
                  name: created_date
                  type: timestamp
                  remarks: "创建时间"
                  constraints:
                    nullable: false
                  defaultValueComputed: "CURRENT_TIMESTAMP"
              - column:
                  name: last_modified_date
                  type: timestamp
                  remarks: "最后更新时间"
                  defaultValueComputed: "NULL ON UPDATE CURRENT_TIMESTAMP"
        - createTable:
            tableName: t_user
            remarks: "用户"
            columns:
              - column:
                  name: id
                  type: bigint
                  remarks: "ID"
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: username
                  type: varchar(20)
                  remarks: "账户"
                  constraints:
                    nullable: false
              - column:
                  name: password
                  type: varchar(100)
                  remarks: "密码"
                  constraints:
                    nullable: false
              - column:
                  name: nickname
                  type: varchar(50)
                  remarks: "昵称"
              - column:
                  name: enabled
                  type: bit(1)
                  remarks: "是否启用, 0: 否, 1: 是. 默认: 1"
                  constraints:
                    nullable: false
                  defaultValueBoolean: true
              - column:
                  name: tenant_id
                  type: bigint
                  remarks: "所属租户ID"
                  constraints:
                    nullable: false
              - column:
                  name: created_date
                  type: timestamp
                  remarks: "创建时间"
                  constraints:
                    nullable: false
                  defaultValueComputed: "CURRENT_TIMESTAMP"
              - column:
                  name: last_modified_date
                  type: timestamp
                  remarks: "最后更新时间"
                  defaultValueComputed: "NULL ON UPDATE CURRENT_TIMESTAMP"
        - createTable:
            tableName: t_client
            remarks: "客户端"
            columns:
              - column:
                  name: id
                  type: bigint
                  remarks: "ID"
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: client_id
                  type: varchar(50)
                  remarks: "客户端ID"
                  constraints:
                    nullable: false
              - column:
                  name: client_secret
                  type: varchar(100)
                  remarks: "客户端密钥"
              - column:
                  name: client_name
                  type: varchar(50)
                  remarks: "客户端名称"
              - column:
                  name: logo_url
                  type: varchar(50)
                  remarks: "客户端Logo链接"
              - column:
                  name: client_authentication_methods
                  type: varchar(150)
                  remarks: "认证方式"
              - column:
                  name: authorization_grant_types
                  type: varchar(300)
                  remarks: "授权方式"
              - column:
                  name: redirect_uris
                  type: varchar(500)
                  remarks: "回调地址"
              - column:
                  name: post_logout_redirect_uris
                  type: varchar(500)
                  remarks: "登出跳转地址"
              - column:
                  name: scopes
                  type: varchar(150)
                  remarks: "授权域"
              - column:
                  name: require_proof_key
                  type: bit(1)
                  remarks: "是否开启密码验证(PKCE模式), 0: 否, 1: 是"
              - column:
                  name: require_authorization_consent
                  type: bit(1)
                  remarks: "是否需要确认授权, 0: 否, 1: 是"
              - column:
                  name: access_token_time_to_live
                  type: int
                  remarks: "AccessToken存活时间,单位: 秒"
              - column:
                  name: refresh_token_time_to_live
                  type: int
                  remarks: "RefreshToken存活时间,单位: 秒"
              - column:
                  name: enabled
                  type: bit(1)
                  remarks: "是否启用, 0: 否, 1: 是. 默认: 1"
                  constraints:
                    nullable: false
                  defaultValueBoolean: true
              - column:
                  name: tenant_id
                  type: bigint
                  remarks: "所属租户ID"
                  constraints:
                    nullable: false
              - column:
                  name: created_date
                  type: timestamp
                  remarks: "创建时间"
                  constraints:
                    nullable: false
                  defaultValueComputed: "CURRENT_TIMESTAMP"
              - column:
                  name: last_modified_date
                  type: timestamp
                  remarks: "最后更新时间"
                  defaultValueComputed: "NULL ON UPDATE CURRENT_TIMESTAMP"
        - createTable:
            tableName: t_consent
            remarks: "用户-客户端授权"
            columns:
              - column:
                  name: user_id
                  type: bigint
                  remarks: "用户ID"
                  constraints:
                    primaryKey: true
              - column:
                  name: client_id
                  type: bigint
                  remarks: "客户端ID"
                  constraints:
                    primaryKey: true
              - column:
                  name: authorities
                  type: varchar(1000)
                  remarks: "授权"
        - createIndex:
            tableName: t_user
            indexName: idx_user_tenant_id
            columns:
              - column:
                  name: tenant_id
        - createIndex:
            tableName: t_client
            indexName: idx_client_tenant_id
            columns:
              - column:
                  name: tenant_id
        - addUniqueConstraint:
            tableName: t_user
            constraintName: uk_user_username_tenant_id
            columnNames: username, tenant_id
        - addUniqueConstraint:
            tableName: t_client
            constraintName: uk_client_client_id_tenant_id
            columnNames: client_id, tenant_id